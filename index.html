<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM | Área 037</title>
    <style>
        :root { --primary: #000; --green: #1b5e20; --bg: #f4f4f4; --orange: #ff9800; }
        body { font-family: 'Inter', sans-serif; padding: 20px; background: var(--bg); color: #333; }
        
        .adm-header { text-align: center; margin-bottom: 30px; background: #000; padding: 25px; border-radius: 15px; }
        .adm-header img { height: 65px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
        
        .container { max-width: 650px; margin: auto; }
        .box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        h2 { font-size: 1rem; border-left: 4px solid #000; padding-left: 10px; margin-bottom: 15px; text-transform: uppercase; font-weight: 900; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; outline: none; }
        button { width: 100%; padding: 14px; background: black; color: white; cursor: pointer; font-weight: 900; border: none; border-radius: 8px; transition: 0.3s; text-transform: uppercase; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }

        /* VISUALIZAÇÃO DOS BANNERS */
        .banner-preview { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .banner-thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 5px; border: 1px solid #eee; background: #eee; }

        /* LISTAGEM DE PRODUTOS */
        .product-item { 
            background: white; padding: 15px; margin-top: 10px; 
            display: flex; align-items: center; border-radius: 10px; 
            border: 1px solid #eee; gap: 15px; transition: 0.2s;
        }
        .product-item:hover { border-color: #ccc; }
        .product-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; background: #f9f9f9; }
        
        .product-info { flex: 1; }
        .product-info span { display: block; font-weight: 700; font-size: 0.9rem; }
        .product-info b { color: var(--green); font-size: 1rem; }

        .actions { display: flex; gap: 8px; }
        .btn-price { background: var(--orange); padding: 8px 12px; font-size: 0.75rem; width: auto; color: white; }
        .btn-del { background: #d32f2f; padding: 8px 12px; font-size: 0.75rem; width: auto; color: white; }
    </style>
</head>
<body>

    <div class="container">
        <!-- LOGO -->
        <div class="adm-header">
            <img src="logo2.png" alt="Área 037">
        </div>

        <!-- BANNERS -->
        <div class="box">
            <h2>Banners do Carrossel</h2>
            <input type="text" id="b1" placeholder="Link Banner 1">
            <input type="text" id="b2" placeholder="Link Banner 2">
            <input type="text" id="b3" placeholder="Link Banner 3">
            <button onclick="updateBanners()" style="background: var(--green);">Salvar Banners</button>
            
            <div class="banner-preview" id="bannerThumbs">
                <!-- Imagens aparecem aqui -->
            </div>
        </div>

        <!-- CADASTRO -->
        <div class="box">
            <h2>Novo Produto</h2>
            <input type="text" id="brand" placeholder="Marca (Nike, Adidas...)">
            <input type="text" id="name" placeholder="Nome do Tênis">
            <input type="number" id="price" placeholder="Preço (Ex: 890)">
            <input type="text" id="img" placeholder="Link da Imagem">
            <button onclick="add()">Cadastrar no Site</button>
        </div>

        <!-- LISTA -->
        <div id="list"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBgjv7At7-QVc6zw0_oLtTxrzSK7nY6Cug",
            authDomain: "area-037.firebaseapp.com",
            databaseURL: "https://area-037-default-rtdb.firebaseio.com",
            projectId: "area-037",
            storageBucket: "area-037.firebasestorage.app",
            messagingSenderId: "509994998279",
            appId: "1:509994998279:web:3024b345e27de5ab0aa8a2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // CARREGA E EXIBE BANNERS ATUAIS
        db.ref("banners").on("value", snap => {
            const b = snap.val();
            if(b) {
                document.getElementById('b1').value = b.link1 || "";
                document.getElementById('b2').value = b.link2 || "";
                document.getElementById('b3').value = b.link3 || "";
                document.getElementById('bannerThumbs').innerHTML = `
                    <img src="${b.link1}" class="banner-thumb">
                    <img src="${b.link2}" class="banner-thumb">
                    <img src="${b.link3}" class="banner-thumb">
                `;
            }
        });

        function updateBanners() {
            const banners = {
                link1: document.getElementById('b1').value,
                link2: document.getElementById('b2').value,
                link3: document.getElementById('b3').value
            };
            db.ref("banners").set(banners).then(() => alert("Banners atualizados com sucesso!"));
        }

        // CADASTRO
        function add() {
            const data = {
                brand: document.getElementById('brand').value.toUpperCase(),
                name: document.getElementById('name').value,
                price: Number(document.getElementById('price').value),
                img: document.getElementById('img').value
            };
            if(data.name && data.price) {
                db.ref("produtos").push(data).then(() => {
                    alert("Produto cadastrado!");
                    document.getElementById('name').value = "";
                    document.getElementById('price').value = "";
                    document.getElementById('img').value = "";
                });
            }
        }

        // LISTA COM EDIÇÃO DE PREÇO
        db.ref("produtos").on("value", snap => {
            const list = document.getElementById('list');
            list.innerHTML = '<h2>Produtos Cadastrados</h2>';
            const data = snap.val();
            if(data) {
                Object.keys(data).forEach(key => {
                    const p = data[key];
                    list.innerHTML += `
                        <div class="product-item">
                            <img src="${p.img}">
                            <div class="product-info">
                                <span>${p.name}</span>
                                <b>R$ ${p.price},00</b>
                            </div>
                            <div class="actions">
                                <button class="btn-price" onclick="changePrice('${key}', ${p.price})">EDITAR R$</button>
                                <button class="btn-del" onclick="del('${key}')">X</button>
                            </div>
                        </div>`;
                });
            }
        });

        window.changePrice = (id, oldPrice) => {
            const nuevo = prompt("Digite o novo preço para este produto:", oldPrice);
            if(nuevo !== null && nuevo !== "") {
                db.ref("produtos/" + id).update({ price: Number(nuevo) })
                  .then(() => alert("Preço atualizado!"));
            }
        }

        window.del = (id) => { 
            if(confirm("Apagar produto permanentemente?")) db.ref("produtos/" + id).remove(); 
        }
    </script>
</body>
</html>
