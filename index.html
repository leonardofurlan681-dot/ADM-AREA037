<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM | Área 037</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #000; 
            --green: #2ecc71; 
            --bg: #121212; 
            --card-bg: #1e1e1e;
            --text: #ffffff;
            --text-dim: #b3b3b3;
            --orange: #f39c12; 
            --red: #e74c3c;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            margin: 0;
            padding: 0; 
            background: var(--bg); 
            color: var(--text); 
            line-height: 1.6;
        }

        /* HEADER PREMIUM */
        .adm-header { 
            background: #000; 
            padding: 40px 20px; 
            text-align: center;
            border-bottom: 2px solid #333;
            margin-bottom: 30px;
        }

        .logo-container {
            background: white;
            display: inline-block;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .adm-header img { 
            height: 70px; 
            display: block;
        }

        .container { 
            max-width: 800px; 
            margin: 0 auto; 
            padding: 0 20px 50px;
        }

        .box { 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.3); 
            margin-bottom: 25px; 
            border: 1px solid #333;
        }

        h2 { 
            font-size: 1.1rem; 
            color: var(--text);
            border-left: 4px solid var(--green); 
            padding-left: 15px; 
            margin-bottom: 20px; 
            text-transform: uppercase; 
            font-weight: 900; 
            letter-spacing: 1px;
        }

        /* FORMULÁRIOS */
        input { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 12px; 
            border: 1px solid #333; 
            border-radius: 10px; 
            font-size: 1rem; 
            outline: none; 
            background: #252525;
            color: white;
        }

        input:focus { border-color: var(--green); box-shadow: 0 0 0 2px rgba(46, 204, 113, 0.2); }

        button { 
            width: 100%; 
            padding: 16px; 
            background: white; 
            color: black; 
            cursor: pointer; 
            font-weight: 900; 
            border: none; 
            border-radius: 10px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            margin-top: 10px;
        }

        button:active { transform: scale(0.98); }
        button:hover { filter: brightness(0.9); }

        /* BANNERS */
        .banner-preview { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); 
            gap: 12px; 
            margin-top: 20px; 
        }
        
        .banner-thumb { 
            width: 100%; 
            aspect-ratio: 16/9; 
            object-fit: cover; 
            border-radius: 8px; 
            border: 2px solid #333;
            background: #252525; 
        }

        /* PRODUTOS */
        .product-item { 
            background: var(--card-bg); 
            padding: 15px; 
            margin-top: 15px; 
            display: flex; 
            align-items: center; 
            border-radius: 12px; 
            border: 1px solid #333; 
            gap: 15px;
        }

        .product-item img { 
            width: 75px; 
            height: 75px; 
            object-fit: cover; 
            border-radius: 10px; 
            background: #fff; 
        }
        
        .product-info { flex: 1; }
        .product-info span { display: block; font-weight: 400; font-size: 0.8rem; color: var(--text-dim); }
        .product-info b { color: var(--text); font-size: 1.05rem; display: block; }

        .actions { display: flex; flex-direction: column; gap: 8px; }
        
        .btn-price { background: var(--orange); padding: 8px 15px; font-size: 0.7rem; color: white; width: auto; }
        .btn-del { background: var(--red); padding: 8px 15px; font-size: 0.7rem; color: white; width: auto; }

        /* RESPONSIVIDADE MOBILE */
        @media (max-width: 500px) {
            .product-item { flex-direction: column; text-align: center; padding: 20px; }
            .actions { flex-direction: row; width: 100%; justify-content: center; }
            .actions button { flex: 1; }
            .product-item img { width: 130px; height: 130px; }
            .adm-header img { height: 55px; }
        }
    </style>
</head>
<body>

    <div class="adm-header">
        <div class="logo-container">
            <img src="logo2.png" alt="Área 037">
        </div>
    </div>

    <div class="container">
        <div class="box">
            <h2>Banners do Carrossel</h2>
            <input type="text" id="b1" placeholder="Link Banner 1">
            <input type="text" id="b2" placeholder="Link Banner 2">
            <input type="text" id="b3" placeholder="Link Banner 3">
            <button onclick="updateBanners()" style="background: var(--green); color: white;">Salvar Banners</button>
            
            <div class="banner-preview" id="bannerThumbs"></div>
        </div>

        <div class="box">
            <h2>Novo Produto</h2>
            <input type="text" id="brand" placeholder="Marca (Ex: Nike)">
            <input type="text" id="name" placeholder="Nome do Tênis">
            <input type="number" id="price" placeholder="Preço (Ex: 299.90)">
            <input type="text" id="img" placeholder="Link da Imagem">
            <button onclick="add()">Cadastrar no Site</button>
        </div>

        <div id="list"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBgjv7At7-QVc6zw0_oLtTxrzSK7nY6Cug",
            authDomain: "area-037.firebaseapp.com",
            databaseURL: "https://area-037-default-rtdb.firebaseio.com",
            projectId: "area-037",
            storageBucket: "area-037.firebasestorage.app",
            messagingSenderId: "509994998279",
            appId: "1:509994998279:web:3024b345e27de5ab0aa8a2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // GERENCIAR BANNERS
        db.ref("banners").on("value", snap => {
            const b = snap.val();
            if(b) {
                document.getElementById('b1').value = b.link1 || "";
                document.getElementById('b2').value = b.link2 || "";
                document.getElementById('b3').value = b.link3 || "";
                document.getElementById('bannerThumbs').innerHTML = `
                    <img src="${b.link1}" class="banner-thumb" onerror="this.style.display='none'">
                    <img src="${b.link2}" class="banner-thumb" onerror="this.style.display='none'">
                    <img src="${b.link3}" class="banner-thumb" onerror="this.style.display='none'">
                `;
            }
        });

        function updateBanners() {
            const banners = {
                link1: document.getElementById('b1').value,
                link2: document.getElementById('b2').value,
                link3: document.getElementById('b3').value
            };
            db.ref("banners").set(banners).then(() => alert("Banners atualizados com sucesso!"));
        }

        // CADASTRAR PRODUTO
        function add() {
            const data = {
                brand: document.getElementById('brand').value.toUpperCase(),
                name: document.getElementById('name').value,
                price: Number(document.getElementById('price').value),
                img: document.getElementById('img').value
            };
            if(data.name && data.price) {
                db.ref("produtos").push(data).then(() => {
                    alert("Produto cadastrado com sucesso!");
                    document.getElementById('brand').value = "";
                    document.getElementById('name').value = "";
                    document.getElementById('price').value = "";
                    document.getElementById('img').value = "";
                });
            } else {
                alert("Preencha o nome e o preço!");
            }
        }

        // LISTAGEM DE PRODUTOS COM FORMATAÇÃO CORRETA
        db.ref("produtos").on("value", snap => {
            const list = document.getElementById('list');
            list.innerHTML = '<h2>Produtos Cadastrados</h2>';
            const data = snap.val();
            
            if(data) {
                Object.keys(data).forEach(key => {
                    const p = data[key];
                    
                    // FORMATAÇÃO PROFISSIONAL DE MOEDA
                    const precoFormatado = Number(p.price).toLocaleString('pt-BR', {
                        style: 'currency',
                        currency: 'BRL'
                    });

                    list.innerHTML += `
                        <div class="product-item">
                            <img src="${p.img}" onerror="this.src='https://placehold.co/100x100?text=Sem+Foto'">
                            <div class="product-info">
                                <span>${p.brand || 'MULTI-MARCAS'}</span>
                                <b>${p.name}</b>
                                <b style="color:var(--green)">${precoFormatado}</b>
                            </div>
                            <div class="actions">
                                <button class="btn-price" onclick="changePrice('${key}', ${p.price})">EDITAR R$</button>
                                <button class="btn-del" onclick="del('${key}')">EXCLUIR</button>
                            </div>
                        </div>`;
                });
            }
        });

        // EDITAR PREÇO
        window.changePrice = (id, oldPrice) => {
            const novo = prompt("Digite o novo preço (use ponto para centavos):", oldPrice);
            if(novo !== null && novo !== "") {
                const valorNumerico = Number(novo.replace(',', '.'));
                if(!isNaN(valorNumerico)) {
                    db.ref("produtos/" + id).update({ price: valorNumerico })
                      .then(() => alert("Preço atualizado!"));
                } else {
                    alert("Erro: Digite apenas números.");
                }
            }
        }

        // EXCLUIR
        window.del = (id) => { 
            if(confirm("Tem certeza que deseja apagar este produto?")) {
                db.ref("produtos/" + id).remove();
            }
        }
    </script>
</body>
</html>
